  <rect x="1015" y="165" width="305" height="380" class="lane" />
  <text x="1167" y="202" text-anchor="middle" class="lane-title">Single LLM Agent</text>
  <text x="1167" y="225" text-anchor="middle" class="lane-subtitle">one JSON action at a time</text>

  <rect x="1055" y="265" width="225" height="68" class="orange" />
  <text x="1167" y="306" text-anchor="middle" class="box-title">Parse Observation</text>

  <rect x="1055" y="365" width="225" height="68" class="orange" />
  <text x="1167" y="392" text-anchor="middle" class="box-title">Reason Over</text>
  <text x="1167" y="414" text-anchor="middle" class="small">policy and code</text>

  <rect x="1055" y="465" width="225" height="68" class="orange" />
  <text x="1167" y="492" text-anchor="middle" class="box-title">Emit Action</text>
  <text x="1167" y="514" text-anchor="middle" class="small">typed JSON payload</text>

  <path d="M1167 333 L1167 365" class="arrow" />
  <path d="M1167 433 L1167 465" class="arrow" />

  <rect x="1375" y="115" width="380" height="705" class="lane" />
  <text x="1565" y="151" text-anchor="middle" class="lane-title">Training, Eval, Demo</text>
  <text x="1565" y="174" text-anchor="middle" class="lane-subtitle">measured improvement evidence</text>

  <rect x="1420" y="220" width="290" height="74" class="purple" />
  <text x="1565" y="251" text-anchor="middle" class="box-title">Parallel Rollouts</text>
  <text x="1565" y="273" text-anchor="middle" class="small">fast cached reset</text>

  <rect x="1420" y="320" width="290" height="74" class="purple" />
  <text x="1565" y="351" text-anchor="middle" class="box-title">TRL GRPO + LoRA</text>
  <text x="1565" y="373" text-anchor="middle" class="small">policy update</text>

  <rect x="1420" y="420" width="290" height="74" class="purple" />
  <text x="1565" y="451" text-anchor="middle" class="box-title">Trackio Metrics</text>
  <text x="1565" y="473" text-anchor="middle" class="small">reward and pass rates</text>

  <rect x="1420" y="520" width="290" height="74" class="purple" />
  <text x="1565" y="551" text-anchor="middle" class="box-title">Held-out Evaluation</text>
  <text x="1565" y="573" text-anchor="middle" class="small">baseline vs trained</text>

  <rect x="1420" y="620" width="290" height="74" class="purple" />
  <text x="1565" y="651" text-anchor="middle" class="box-title">Demo Artifacts</text>
