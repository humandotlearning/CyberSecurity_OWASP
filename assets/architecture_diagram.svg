  <text x="570" y="268" text-anchor="middle" class="small">load cached bundle</text>

  <rect x="715" y="215" width="190" height="78" class="green" />
  <text x="810" y="246" text-anchor="middle" class="box-title">Sampler</text>
  <text x="810" y="268" text-anchor="middle" class="small">validated cache slice</text>

  <rect x="475" y="345" width="190" height="78" class="green" />
  <text x="570" y="376" text-anchor="middle" class="box-title">Episode State</text>
  <text x="570" y="398" text-anchor="middle" class="small">phase, history, diff</text>

  <rect x="715" y="345" width="190" height="78" class="green" />
  <text x="810" y="376" text-anchor="middle" class="box-title">Typed Tools</text>
  <text x="810" y="398" text-anchor="middle" class="small">inspect, request, patch</text>

  <rect x="475" y="475" width="190" height="78" class="green" />
  <text x="570" y="506" text-anchor="middle" class="box-title">App Sandbox</text>
  <text x="570" y="528" text-anchor="middle" class="small">cloned workspace</text>

  <rect x="715" y="475" width="190" height="78" class="green" />
  <text x="810" y="506" text-anchor="middle" class="box-title">Verifier</text>
  <text x="810" y="528" text-anchor="middle" class="small">security + regression</text>

  <rect x="475" y="605" width="190" height="78" class="green" />
  <text x="570" y="636" text-anchor="middle" class="box-title">Reward Engine</text>
  <text x="570" y="658" text-anchor="middle" class="small">components + penalties</text>

  <rect x="715" y="605" width="190" height="78" class="green" />
  <text x="810" y="636" text-anchor="middle" class="box-title">API + Logger</text>
  <text x="810" y="658" text-anchor="middle" class="small">/ws, /step, artifacts</text>

  <path d="M665 254 L715 254" class="arrow" />
  <path d="M570 293 L570 345" class="arrow" />
  <path d="M810 293 L810 345" class="arrow" />
  <path d="M665 384 L715 384" class="arrow" />
  <path d="M715 405 C665 425 620 445 570 475" class="arrow" />
  <path d="M665 514 L715 514" class="arrow" />
