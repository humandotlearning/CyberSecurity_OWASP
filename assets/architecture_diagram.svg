  <rect x="540" y="875" width="710" height="94" class="gray" />
  <text x="895" y="912" text-anchor="middle" class="box-title">Feedback / Adaptation Loop</text>
  <text x="895" y="938" text-anchor="middle" class="small">episode logs -&gt; failure analysis -&gt; sampling weights -&gt; new cache jobs</text>

