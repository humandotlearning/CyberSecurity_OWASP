<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">CyberSecurity_OWASP cached scenario architecture</title>
  <desc id="desc">Offline scenario authoring produces a validated cache. The OpenEnv runtime loads cached bundles, exchanges typed actions with one LLM agent, sends terminal rewards into GRPO training, and feeds failures back into scenario sampling.</desc>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; fill: #111827; }
    .title { font-size: 34px; font-weight: 700; }
    .subtitle { font-size: 16px; fill: #475569; }
    .lane-title { font-size: 21px; font-weight: 700; }
    .lane-subtitle { font-size: 14px; fill: #475569; }
    .box-title { font-size: 16px; font-weight: 700; }
    .small { font-size: 13px; fill: #334155; }
    .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; rx: 18; }
    .blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2; rx: 12; }
    .green { fill: #ecfdf5; stroke: #059669; stroke-width: 2; rx: 12; }
    .orange { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 12; }
    .purple { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 12; }
    .gray { fill: #f1f5f9; stroke: #64748b; stroke-width: 2; rx: 12; }
    .arrow { stroke: #0f172a; stroke-width: 4; fill: none; marker-end: url(#arrow); stroke-linecap: round; stroke-linejoin: round; }
    .dash { stroke-dasharray: 10 10; }
    svg { background: #ffffff; }
    .background { fill: #ffffff; }
    .label { font-size: 14px; font-weight: 700; fill: #0f172a; paint-order: stroke; stroke: #ffffff; stroke-width: 5; stroke-linejoin: round; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="18" markerHeight="14" refX="16" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L18,7 L0,14 Z" fill="#0f172a" />
    </marker>
  </defs>

  <rect width="1800" height="1040" class="background" />

  <text x="50" y="52" class="title">CyberSecurity_OWASP Cached Scenario Architecture</text>
  <text x="50" y="80" class="subtitle">Validated scenario bundles feed deterministic OpenEnv episodes, GRPO rollouts, Trackio metrics, and demo artifacts.</text>

  <rect x="40" y="115" width="335" height="705" class="lane" />
  <text x="207" y="151" text-anchor="middle" class="lane-title">Scenario Factory</text>
  <text x="207" y="174" text-anchor="middle" class="lane-subtitle">offline authoring and cache prep</text>

  <rect x="75" y="205" width="265" height="74" class="blue" />
  <text x="207" y="236" text-anchor="middle" class="box-title">LLM Author</text>
  <text x="207" y="258" text-anchor="middle" class="small">config-driven scenario drafts</text>

  <rect x="75" y="300" width="265" height="74" class="blue" />
  <text x="207" y="331" text-anchor="middle" class="box-title">ScenarioSpec</text>
  <text x="207" y="353" text-anchor="middle" class="small">policy, layout, bug target</text>

  <rect x="75" y="395" width="265" height="74" class="blue" />
  <text x="207" y="426" text-anchor="middle" class="box-title">A01 Mutator</text>
  <text x="207" y="448" text-anchor="middle" class="small">FastAPI variants and traps</text>

  <rect x="75" y="490" width="265" height="74" class="blue" />
  <text x="207" y="521" text-anchor="middle" class="box-title">Compiler</text>
  <text x="207" y="543" text-anchor="middle" class="small">executable app bundle</text>

  <rect x="75" y="585" width="265" height="74" class="blue" />
  <text x="207" y="616" text-anchor="middle" class="box-title">Verifier</text>
  <text x="207" y="638" text-anchor="middle" class="small">visible and hidden tests</text>

  <rect x="75" y="680" width="265" height="74" class="blue" />
  <text x="207" y="711" text-anchor="middle" class="box-title">Versioned Cache</text>
  <text x="207" y="733" text-anchor="middle" class="small">split, difficulty, hash</text>

  <path d="M207 279 L207 300" class="arrow" />
  <path d="M207 374 L207 395" class="arrow" />
  <path d="M207 469 L207 490" class="arrow" />
  <path d="M207 564 L207 585" class="arrow" />
  <path d="M207 659 L207 680" class="arrow" />

  <rect x="435" y="115" width="510" height="705" class="lane" />
  <text x="690" y="151" text-anchor="middle" class="lane-title">OpenEnv Runtime</text>
  <text x="690" y="174" text-anchor="middle" class="lane-subtitle">cache-backed, isolated, typed episodes</text>

  <rect x="475" y="215" width="190" height="78" class="green" />
