<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">CyberSecurity_OWASP architecture diagram</title>
  <desc id="desc">System architecture showing scenario factory, OpenEnv runtime, single LLM agent, and training/evaluation components.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.group{fill:#ffffff;stroke:#cbd5e1;stroke-width:2}.node{fill:#eef6ff;stroke:#2563eb;stroke-width:2}.node2{fill:#ecfdf5;stroke:#059669;stroke-width:2}.node3{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.node4{fill:#f5f3ff;stroke:#7c3aed;stroke-width:2}.title{font:700 22px Arial, sans-serif;fill:#111827}.label{font:700 15px Arial, sans-serif;fill:#111827}.small{font:13px Arial, sans-serif;fill:#374151}.groupTitle{font:700 18px Arial, sans-serif;fill:#0f172a}.edge{stroke:#374151;stroke-width:2;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <text class="title" x="40" y="44">CyberSecurity_OWASP Architecture</text>

  <rect class="group" x="30" y="80" width="270" height="610" rx="10"/>
  <text class="groupTitle" x="55" y="115">Scenario Factory</text>
  <rect class="node" x="55" y="145" width="220" height="72" rx="8"/>
  <text class="label" x="75" y="174">Policy Graph</text>
  <text class="small" x="75" y="197">users, roles, tenants, ownership</text>
  <rect class="node" x="55" y="242" width="220" height="72" rx="8"/>
  <text class="label" x="75" y="271">Template Renderer</text>
  <text class="small" x="75" y="294">FastAPI routes, services, guards</text>
  <rect class="node" x="55" y="339" width="220" height="72" rx="8"/>
  <text class="label" x="75" y="368">A01 Bug Mutator</text>
  <text class="small" x="75" y="391">one injected authorization defect</text>
  <rect class="node" x="55" y="436" width="220" height="72" rx="8"/>
  <text class="label" x="75" y="465">Fixture Generator</text>
  <text class="small" x="75" y="488">visible tests + hidden facts</text>
  <rect class="node" x="55" y="555" width="220" height="80" rx="8"/>
  <text class="label" x="75" y="587">Scenario Compiler</text>
  <text class="small" x="75" y="611">seeded generated workspace</text>

  <rect class="group" x="350" y="80" width="440" height="610" rx="10"/>
  <text class="groupTitle" x="375" y="115">OpenEnv Runtime</text>
  <rect class="node2" x="380" y="145" width="170" height="70" rx="8"/>
  <text class="label" x="400" y="174">reset(seed)</text>
  <text class="small" x="400" y="196">fresh scenario</text>
  <rect class="node2" x="590" y="145" width="170" height="70" rx="8"/>
  <text class="label" x="610" y="174">State Store</text>
  <text class="small" x="610" y="196">phase, history, metrics</text>
  <rect class="node2" x="380" y="260" width="380" height="78" rx="8"/>
  <text class="label" x="405" y="290">Typed step(action) Tools</text>
  <text class="small" x="405" y="313">inspect, read, request, compare, patch, test, submit</text>
  <rect class="node2" x="380" y="382" width="170" height="82" rx="8"/>
  <text class="label" x="400" y="413">Local App</text>
  <text class="small" x="400" y="436">editable generated files</text>
  <rect class="node2" x="590" y="382" width="170" height="82" rx="8"/>
  <text class="label" x="610" y="413">Verifier</text>
  <text class="small" x="610" y="436">hidden invariant tests</text>
  <rect class="node2" x="380" y="515" width="170" height="82" rx="8"/>
  <text class="label" x="400" y="546">Reward Engine</text>
  <text class="small" x="400" y="569">stable components</text>
  <rect class="node2" x="590" y="515" width="170" height="82" rx="8"/>
  <text class="label" x="610" y="546">FastAPI Server</text>
  <text class="small" x="610" y="569">/ws, /reset, /step, /state</text>

  <rect class="group" x="840" y="80" width="370" height="235" rx="10"/>
  <text class="groupTitle" x="865" y="115">Single LLM Agent</text>
  <rect class="node3" x="870" y="145" width="300" height="56" rx="8"/>
  <text class="label" x="895" y="179">Observation Parser</text>
  <rect class="node3" x="870" y="220" width="300" height="56" rx="8"/>
  <text class="label" x="895" y="254">Policy + Code Reasoning</text>

  <rect class="group" x="840" y="360" width="370" height="330" rx="10"/>
  <text class="groupTitle" x="865" y="395">Training, Evaluation, Demo</text>
  <rect class="node4" x="870" y="425" width="300" height="56" rx="8"/>
  <text class="label" x="895" y="459">Rollout Loop</text>
  <rect class="node4" x="870" y="500" width="300" height="56" rx="8"/>
  <text class="label" x="895" y="534">TRL GRPO + LoRA</text>
  <rect class="node4" x="870" y="575" width="300" height="56" rx="8"/>
  <text class="label" x="895" y="609">Trackio + Held-out Eval</text>

  <path class="edge" d="M165 217 L165 242"/>
  <path class="edge" d="M165 314 L165 339"/>
  <path class="edge" d="M165 411 L165 436"/>
  <path class="edge" d="M165 508 L165 555"/>
  <path class="edge" d="M275 595 L380 180"/>
  <path class="edge" d="M550 180 L590 180"/>
  <path class="edge" d="M675 215 L675 260"/>
  <path class="edge" d="M570 338 L465 382"/>
  <path class="edge" d="M570 338 L675 382"/>
  <path class="edge" d="M675 464 L465 515"/>
  <path class="edge" d="M550 556 L590 556"/>
  <path class="edge" d="M760 556 L870 453"/>
  <path class="edge" d="M760 300 L870 173"/>
  <path class="edge" d="M870 248 L760 300"/>
  <path class="edge" d="M1020 481 L1020 500"/>
  <path class="edge" d="M1020 556 L1020 575"/>
  <path class="edge" d="M870 528 L760 180"/>
</svg>
